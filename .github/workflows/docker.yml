name: Docker

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      push:
        description: Push image to GHCR
        type: boolean
        default: true

concurrency:
  group: docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  image:
    name: Build and publish
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Load CI config
        run: sh ci/scripts/load-ci-env.sh

      - name: Image name
        id: image
        run: |
          set -eu
          OWNER=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          NAME=$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "image=${REGISTRY}/${OWNER}/${NAME}" >>"${GITHUB_OUTPUT}"

      - name: Decide push
        id: push
        run: |
          set -eu
          PUSH=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.push }}" = "true" ]; then
              PUSH=true
            fi
          elif [ "${{ github.event_name }}" != "pull_request" ]; then
            PUSH=true
          fi
          echo "push=${PUSH}" >>"${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        if: steps.push.outputs.push == 'true'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ steps.push.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEBIAN_IMAGE=${{ env.DEBIAN_IMAGE }}
            ODIN_VERSION=${{ env.ODIN_VERSION }}
            ODIN_LINUX_AMD64_SHA256=${{ env.ODIN_LINUX_AMD64_SHA256 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
